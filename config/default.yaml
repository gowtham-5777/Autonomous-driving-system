# =============================================================================
# Autonomous Driving Assistance System — Default Configuration
# =============================================================================
# Central settings for paths, models, inference thresholds, and output behavior.
# data_root points to Google Drive (Option A) for Colab Pro training/inference.
# =============================================================================

project:
  name: "Autonomous Driving Assistance System"
  version: "1.0"

# Root directory on Google Drive where datasets, videos, and models are stored
data_root: "/content/drive/MyDrive/adas-project"

# Dataset and output paths (relative to data_root)
paths:
  coco: "${data_root}/datasets/coco2017"
  cityscapes: "${data_root}/datasets/cityscapes"
  gtsrb: "${data_root}/datasets/gtsrb"
  videos: "${data_root}/videos"
  processed: "${data_root}/processed"
  models_pretrained: "${data_root}/models/pretrained"
  models_trained: "${data_root}/models/trained"

# Weight filenames resolved relative to pretrained or trained directories
weight_files:
  yolop: "yolop/End-to-end.pth"
  yolov8: "yolov8/yolov8s.pt"
  yolov8_sign: "yolov8_sign/traffic_signs_yolov8n.pt"
  yolov8_signal: "yolov8_signal/traffic_signals_yolov8n.pt"
  ssd_mobilenetv2: "ssd_mobilenet_v2_coco.pb"
  yolov5: "yolov5_traffic_signs.pt"
  unet: "unet_cityscapes.pt"
  traffic_light_cnn: "traffic_light_cnn.pt"

# Which directory each weight file lives in: "pretrained" or "trained"
weight_locations:
  yolop: "pretrained"
  yolov8: "pretrained"
  yolov8_sign: "trained"
  yolov8_signal: "trained"
  ssd_mobilenetv2: "pretrained"
  yolov5: "trained"
  unet: "pretrained"
  traffic_light_cnn: "trained"

# Reference-aligned model selections (one per perception module)
models:
  lane_detection: "YOLOP"
  object_detection: "YOLOv8"
  traffic_sign: "YOLOv8"
  traffic_signal: "YOLOv8"
  segmentation: "UNet"

# Minimum confidence scores for detections to be considered valid
thresholds:
  object_confidence: 0.5
  object_iou: 0.45
  sign_confidence: 0.5
  sign_iou: 0.45
  signal_confidence: 0.5
  signal_iou: 0.45
  traffic_light_confidence: 0.5

# YOLOv8 vehicle detection settings
yolov8:
  model_variant: "s"
  imgsz: 640
  device: "cpu"
  max_detections: 100

# YOLOv8 traffic sign detection settings
yolov8_sign:
  model_variant: "n"
  imgsz: 640
  device: "cpu"
  max_detections: 50
  num_classes: 7

# YOLOv8 traffic signal detection settings
yolov8_signal:
  model_variant: "n"
  imgsz: 640
  device: "cpu"
  max_detections: 20
  num_classes: 3

# Web application output options
output:
  save_annotated_video: true
  display_hud: true

# Decision engine thresholds
decision:
  red_light_confidence: 0.70
  stop_sign_confidence: 0.70
  stop_sign_lower_frame_fraction: 0.40
  vulnerable_user_confidence: 0.60
  large_vehicle_area_ratio: 0.08
  lane_offset_warn_px: 35.0
  drivable_overlap_threshold: 0.15

# Pipeline orchestrator options
pipeline:
  run_lane: true
  run_vehicles: true
  run_signs: true
  run_signals: true
  run_segmentation: false
  auto_initialize: true
  collect_timing: true
